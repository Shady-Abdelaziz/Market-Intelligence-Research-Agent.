name: ci
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov respx hypothesis ruff mypy types-pyyaml
      - name: Lint
        run: ruff check app/ tests/ eval/
      - name: Format check
        run: ruff format --check app/ tests/ eval/
      - name: Type check
        run: mypy --ignore-missing-imports app/ || true
      - name: Tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: pytest -v --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
